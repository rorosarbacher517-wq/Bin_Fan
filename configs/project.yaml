project:
  name: GridWeather-Agent
  seed: 42

paths:
  data_dir: data/demo
  artifact_dir: artifacts

region:
  name: guizhou_bijie_liupanshui_mountain
  # CDS area order: north, west, south, east
  # Northwest Guizhou mountain corridor, suitable for icing and micro-meteorological risk demos.
  area: [27.7, 104.3, 26.1, 106.1]

time:
  start: "2023-01-01"
  end: "2023-01-21"
  frequency: "1H"

demo:
  n_lines: 4
  towers_per_line: 35
  weather_grid_size: 5

era5_land:
  dataset: reanalysis-era5-land
  variables:
    - 2m_temperature
    - 2m_dewpoint_temperature
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - total_precipitation
    - surface_pressure
  product_type: reanalysis
  format: netcdf

gee:
  # Keep real credentials outside Git. Pass these paths through CLI args or environment variables.
  service_account_file: ""
  service_account_email: ""

model:
  target: risk_level
  test_days: 5
  random_state: 42
  high_risk_threshold: 2

llm:
  # LLM enhancement is optional and disabled by default so the demo remains fully reproducible offline.
  # Runtime environment variables override this static design block.
  enabled_env: GRIDWEATHER_LLM_ENABLED
  default_provider: deepseek
  fallback_provider: zhipu
  domestic_first: true
  providers:
    deepseek:
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      chat_model: deepseek-chat
      reasoning_model: deepseek-reasoner
      role: default Chinese planner, summarizer, and operator-answer enhancer
    zhipu:
      api_key_env: ZHIPU_API_KEY
      base_url: https://open.bigmodel.cn/api/paas/v4
      chat_model: glm-4-plus
      vision_model: glm-4v-plus
      role: domestic multimodal fallback for image/PDF-page understanding
    qwen:
      api_key_env: DASHSCOPE_API_KEY
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat_model: qwen-plus
      vision_model: qwen-vl-plus
      role: Alibaba Cloud ecosystem fallback for domestic enterprise deployment
    openai:
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      chat_model: gpt-4.1-mini
      vision_model: gpt-4o
      role: optional overseas fallback and multimodal enhancement
