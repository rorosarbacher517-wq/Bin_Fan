project:
  name: GridWeather-Agent-China-Benchmark
  seed: 42

paths:
  data_dir: data/china_benchmark
  artifact_dir: artifacts

time:
  start: "2023-01-01"
  end: "2023-01-31"
  frequency: "1H"

demo:
  n_lines: 2
  towers_per_line: 24
  weather_grid_size: 4

era5_land:
  dataset: reanalysis-era5-land
  variables:
    - 2m_temperature
    - 2m_dewpoint_temperature
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - total_precipitation
    - surface_pressure
  product_type: reanalysis
  format: netcdf

